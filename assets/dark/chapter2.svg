<svg viewBox="0 0 1000 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chapter II — Experience &amp; Academics">
  <style>
    :root { 
      --bone: #ECE6DA; 
      --rule: #2C2B2A; 
      --muted: #8C857B; 
      --dim: #6B655D; 
      --accent: #D9663F; 
      --card-bg: #0B0A09;
      --card-border: #2C2B2A;
      --green: #22C55E;
    }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.2s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .rise { opacity: 0; animation: rise .8s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(10px); } to { opacity:1;transform:translateY(0); } }
    .fade { opacity: 0; animation: fade .6s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    
    .a1{animation-delay:.1s} .a2{animation-delay:.3s} .a3{animation-delay:.5s} .a4{animation-delay:.7s} .a5{animation-delay:.9s}
    @media (prefers-reduced-motion: reduce) {
      .draw,.rise,.fade { animation: none; }
      .draw { stroke-dashoffset: 0; } .rise,.fade { opacity: 1; }
    }
  </style>

  <!-- Panel Borders -->
  <line class="draw a1" x1="48" y1="20" x2="952" y2="20" stroke="var(--rule)" stroke-width="1"/>
  <g class="fade a1">
    <text class="mono" fill="var(--bone)" x="48" y="42" font-size="12" font-weight="700" letter-spacing="2">CHAPTER II // WORK EXPERIENCE &amp; ACADEMICS</text>
    <text class="mono" fill="var(--muted)" x="952" y="42" font-size="11" letter-spacing="2" text-anchor="end">SYS.LOG // Nº 02</text>
  </g>
  <line class="draw a2" x1="48" y1="56" x2="952" y2="56" stroke="var(--rule)" stroke-width="1"/>

  <!-- Card 1: Geeks Solutions -->
  <g class="rise a2">
    <rect x="48" y="80" width="896" height="240" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <!-- Top HUD status row -->
    <circle cx="68" cy="106" r="4" fill="var(--green)"/>
    <text class="mono" fill="var(--green)" x="80" y="110" font-size="10.5" letter-spacing="1">LIVE // NASHIK, INDIA</text>
    <text class="mono" fill="var(--muted)" x="928" y="110" font-size="10.5" text-anchor="end">2024 — PRESENT</text>
    <line x1="48" y1="126" x2="944" y2="126" stroke="var(--card-border)" stroke-width="1"/>
    
    <!-- Job details -->
    <text class="mono" fill="var(--bone)" x="68" y="152" font-size="16" font-weight="700">Geeks Solutions Pvt. Ltd.</text>
    <text class="mono" fill="var(--accent)" x="68" y="172" font-size="12">DevOps &amp; Security Engineer — Full-Time</text>
    
    <text class="mono" fill="var(--bone)" x="68" y="200" font-size="11.5">▪ Managed production AKS clusters hosting high-availability payment systems.</text>
    <text class="mono" fill="var(--bone)" x="68" y="220" font-size="11.5">▪ Implemented secure GitOps deployments using ArgoCD, Helm, and policy gates.</text>
    <text class="mono" fill="var(--bone)" x="68" y="240" font-size="11.5">▪ Deployed cloud database clusters using CloudNativePG (CNPG) and MongoDB.</text>
    <text class="mono" fill="var(--bone)" x="68" y="260" font-size="11.5">▪ Built observability stacks using Prometheus, Grafana, and Alertmanager.</text>

    <!-- Tech tags -->
    <text class="mono" fill="var(--muted)" x="68" y="295" font-size="10.5">Stack: Azure AKS · ArgoCD · Helm · CloudNativePG · Prometheus · Grafana · PCI-DSS · AWS</text>
  </g>

  <!-- Card 2: Tata Consultancy Services -->
  <g class="rise a3">
    <rect x="48" y="340" width="896" height="210" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--muted)" x="68" y="370" font-size="10.5" letter-spacing="1">PRIOR // INDIA</text>
    <text class="mono" fill="var(--muted)" x="928" y="370" font-size="10.5" text-anchor="end">AUG 2022 — 2023</text>
    <line x1="48" y1="386" x2="944" y2="386" stroke="var(--card-border)" stroke-width="1"/>
    
    <text class="mono" fill="var(--bone)" x="68" y="412" font-size="16" font-weight="700">Tata Consultancy Services</text>
    <text class="mono" fill="var(--accent)" x="68" y="432" font-size="12">System Administrator (Vulnerability Security Operations)</text>
    
    <text class="mono" fill="var(--bone)" x="68" y="460" font-size="11.5">▪ Secured enterprise assets across Linux and Windows servers using Nessus and Qualys.</text>
    <text class="mono" fill="var(--bone)" x="68" y="480" font-size="11.5">▪ Structured vulnerability patching schedules based on strict CVSS scores.</text>
    
    <text class="mono" fill="var(--muted)" x="68" y="520" font-size="10.5">Stack: Linux · Nessus · Qualys · CVSS · Windows Server · Auditing</text>
  </g>

  <!-- Card 3 & 4 (Grid column): CODTECH & MCA / BBA -->
  <g class="rise a4">
    <!-- CODTECH Intern -->
    <rect x="48" y="570" width="438" height="210" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--muted)" x="68" y="598" font-size="10.5">PRIOR // INTERNSHIP</text>
    <line x1="48" y1="612" x2="486" y2="612" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--bone)" x="68" y="638" font-size="15" font-weight="700">CODTECH IT Solutions</text>
    <text class="mono" fill="var(--accent)" x="68" y="656" font-size="11.5">Cybersecurity Intern — Jan 2025</text>
    <text class="mono" fill="var(--bone)" x="68" y="685" font-size="11.5">▪ Built Python tools for integrity audits.</text>
    <text class="mono" fill="var(--bone)" x="68" y="705" font-size="11.5">▪ Developed ransomware quarantine prototype.</text>
    <text class="mono" fill="var(--muted)" x="68" y="750" font-size="10.5">Stack: Python · Pentests · Cryptography</text>

    <!-- Education details -->
    <rect x="506" y="570" width="438" height="210" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--muted)" x="526" y="598" font-size="10.5">ACADEMIC TIMELINE</text>
    <line x1="506" y1="612" x2="944" y2="612" stroke="var(--card-border)" stroke-width="1"/>
    
    <text class="mono" fill="var(--bone)" x="526" y="638" font-size="14" font-weight="700">Post-Graduate MCA</text>
    <text class="mono" fill="var(--muted)" x="526" y="656" font-size="11">K. K. Wagh Institute · CGPA: 8.0 · 2024–2026</text>
    <text class="mono" fill="var(--accent)" x="526" y="674" font-size="11">★ Best Outgoing Student Award</text>

    <text class="mono" fill="var(--bone)" x="526" y="718" font-size="14" font-weight="700">BBA-CA Graduation</text>
    <text class="mono" fill="var(--muted)" x="526" y="736" font-size="11">B.Y.K. College of Commerce · CGPA: 8.95 · 2019–2022</text>
  </g>

  <line class="draw a5" x1="48" y1="800" x2="952" y2="800" stroke="var(--rule)" stroke-width="1"/>
</svg>
