<svg viewBox="0 0 1000 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chapter II — Experience &amp; Academics">
  <style>
    :root { 
      --bone: #ECE6DA; 
      --rule: #2C2B2A; 
      --muted: #8C857B; 
      --dim: #6B655D; 
      --accent: #D9663F; 
      --card-bg: #0B0A09;
      --card-border: #2C2B2A;
      --green: #22C55E;
    }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.2s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .rise { opacity: 0; animation: rise .8s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(10px); } to { opacity:1;transform:translateY(0); } }
    .fade { opacity: 0; animation: fade .6s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    
    .a1{animation-delay:.1s} .a2{animation-delay:.3s} .a3{animation-delay:.5s} .a4{animation-delay:.7s} .a5{animation-delay:.9s}
    @media (prefers-reduced-motion: reduce) {
      .draw,.rise,.fade { animation: none; }
      .draw { stroke-dashoffset: 0; } .rise,.fade { opacity: 1; }
    }
  </style>

  <!-- Panel Borders -->
  <line class="draw a1" x1="48" y1="20" x2="952" y2="20" stroke="var(--rule)" stroke-width="1"/>
  <g class="fade a1">
    <text class="mono" fill="var(--bone)" x="48" y="42" font-size="13.5" font-weight="700" letter-spacing="2">CHAPTER II // WORK EXPERIENCE &amp; ACADEMICS</text>
    <text class="mono" fill="var(--muted)" x="952" y="42" font-size="12" letter-spacing="2" text-anchor="end">SYS.LOG // Nº 02</text>
  </g>
  <line class="draw a2" x1="48" y1="56" x2="952" y2="56" stroke="var(--rule)" stroke-width="1"/>

  <!-- Card 1: Geeks Solutions -->
  <g class="rise a2">
    <rect x="48" y="80" width="896" height="245" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <!-- Top HUD status row -->
    <circle cx="68" cy="106" r="4" fill="var(--green)"/>
    <text class="mono" fill="var(--green)" x="80" y="110" font-size="11.5" letter-spacing="1">LIVE // NASHIK, INDIA</text>
    <text class="mono" fill="var(--muted)" x="928" y="110" font-size="11.5" text-anchor="end">2024 — PRESENT</text>
    <line x1="48" y1="126" x2="944" y2="126" stroke="var(--card-border)" stroke-width="1"/>
    
    <!-- Job details -->
    <text class="mono" fill="var(--bone)" x="68" y="152" font-size="17.5" font-weight="700">Geeks Solutions Pvt. Ltd.</text>
    <text class="mono" fill="var(--accent)" x="68" y="174" font-size="13">DevOps &amp; Security Engineer — Full-Time</text>
    
    <text class="mono" fill="var(--bone)" x="68" y="202" font-size="12.5">▪ Managed production AKS clusters hosting high-availability payment systems.</text>
    <text class="mono" fill="var(--bone)" x="68" y="224" font-size="12.5">▪ Implemented secure GitOps deployments using ArgoCD, Helm, and policy gates.</text>
    <text class="mono" fill="var(--bone)" x="68" y="246" font-size="12.5">▪ Deployed cloud database clusters using CloudNativePG (CNPG) and MariaDB Galera Cluster.</text>
    <text class="mono" fill="var(--bone)" x="68" y="268" font-size="12.5">▪ Built observability stacks using Prometheus, Grafana, and Alertmanager.</text>

    <!-- Tech tags -->
    <text class="mono" fill="var(--muted)" x="68" y="300" font-size="11.5">Stack: Azure AKS · ArgoCD · Helm · CloudNativePG · MariaDB Galera · Prometheus · Grafana · AWS</text>
  </g>

  <!-- Card 2: Tata Consultancy Services -->
  <g class="rise a3">
    <rect x="48" y="345" width="896" height="215" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--muted)" x="68" y="375" font-size="11.5" letter-spacing="1">PRIOR // INDIA</text>
    <text class="mono" fill="var(--muted)" x="928" y="375" font-size="11.5" text-anchor="end">AUG 2022 — 2023</text>
    <line x1="48" y1="391" x2="944" y2="391" stroke="var(--card-border)" stroke-width="1"/>
    
    <text class="mono" fill="var(--bone)" x="68" y="417" font-size="17.5" font-weight="700">Tata Consultancy Services</text>
    <text class="mono" fill="var(--accent)" x="68" y="439" font-size="13">System Administrator (Vulnerability Security Operations)</text>
    
    <text class="mono" fill="var(--bone)" x="68" y="467" font-size="12.5">▪ Secured enterprise assets across Linux and Windows servers using Nessus and Qualys.</text>
    <text class="mono" fill="var(--bone)" x="68" y="489" font-size="12.5">▪ Structured vulnerability patching schedules based on strict CVSS scores.</text>
    
    <text class="mono" fill="var(--muted)" x="68" y="525" font-size="11.5">Stack: Linux · Nessus · Qualys · CVSS · Windows Server · Auditing</text>
  </g>

  <!-- Card 3 & 4 (Grid column): CODTECH & MCA / BBA -->
  <g class="rise a4">
    <!-- CODTECH Intern -->
    <rect x="48" y="580" width="438" height="195" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--muted)" x="68" y="608" font-size="11.5">PRIOR // INTERNSHIP</text>
    <line x1="48" y1="622" x2="486" y2="622" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--bone)" x="68" y="648" font-size="16" font-weight="700">CODTECH IT Solutions</text>
    <text class="mono" fill="var(--accent)" x="68" y="668" font-size="12.5">Cybersecurity Intern — Jan 2025</text>
    <text class="mono" fill="var(--bone)" x="68" y="697" font-size="12.5">▪ Built Python tools for integrity audits.</text>
    <text class="mono" fill="var(--bone)" x="68" y="719" font-size="12.5">▪ Developed ransomware quarantine prototype.</text>
    <text class="mono" fill="var(--muted)" x="68" y="755" font-size="11.5">Stack: Python · Pentests · Cryptography</text>

    <!-- Education details (Expanded) -->
    <rect x="506" y="580" width="438" height="340" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--muted)" x="526" y="608" font-size="11.5">ACADEMIC FOUNDATION</text>
    <line x1="506" y1="622" x2="944" y2="622" stroke="var(--card-border)" stroke-width="1"/>
    
    <!-- MCA -->
    <text class="mono" fill="var(--bone)" x="526" y="645" font-size="14.5" font-weight="700">Post-Graduate MCA (2024–2026)</text>
    <text class="mono" fill="var(--muted)" x="526" y="662" font-size="11.5">K.K. Wagh Institute of Engineering · CGPA: 8.0</text>
    <text class="mono" fill="var(--bone)" x="526" y="680" font-size="12">Data Structures · AI/ML · Networks · Cloud Computing</text>
    <text class="mono" fill="var(--accent)" x="526" y="698" font-size="12">★ Best Outgoing Student Award</text>

    <!-- BBA -->
    <text class="mono" fill="var(--bone)" x="526" y="736" font-size="14.5" font-weight="700">BBA-CA Graduation (2019–2022)</text>
    <text class="mono" fill="var(--muted)" x="526" y="753" font-size="11.5">B.Y.K. College of Commerce · CGPA: 8.95</text>
    <text class="mono" fill="var(--bone)" x="526" y="771" font-size="12">Programming · Database Management · Business Analytics</text>

    <!-- HSC -->
    <text class="mono" fill="var(--bone)" x="526" y="809" font-size="14.5" font-weight="700">HSC Commerce (2017–2019)</text>
    <text class="mono" fill="var(--muted)" x="526" y="826" font-size="11.5">Bhonsala Military College · Grade: B</text>
    <text class="mono" fill="var(--bone)" x="526" y="844" font-size="12">Financial Principles · Business Operations</text>
  </g>

  <line class="draw a5" x1="48" y1="940" x2="952" y2="940" stroke="var(--rule)" stroke-width="1"/>
</svg>
