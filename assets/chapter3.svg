<svg viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chapter III — Constellation &amp; Tech Stack">
  <style>
    :root { 
      --bone: #0B0A09; 
      --rule: #E2DDD5; 
      --muted: #7E7870; 
      --dim: #9E978E; 
      --accent: #D9663F; 
    }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.2s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .rise { opacity: 0; animation: rise .8s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(10px); } to { opacity:1;transform:translateY(0); } }
    .fade { opacity: 0; animation: fade .6s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    
    .a1{animation-delay:.1s} .a2{animation-delay:.3s} .a3{animation-delay:.5s} .a4{animation-delay:.7s}
    @media (prefers-reduced-motion: reduce) {
      .draw,.rise,.fade { animation: none; }
      .draw { stroke-dashoffset: 0; } .rise,.fade { opacity: 1; }
    }
  </style>

  <!-- Panel Borders -->
  <line class="draw a1" x1="48" y1="20" x2="952" y2="20" stroke="var(--rule)" stroke-width="1"/>
  <g class="fade a1">
    <text class="mono" fill="var(--bone)" x="48" y="42" font-size="12" font-weight="700" letter-spacing="2">CHAPTER III // CONSTELLATION &amp; TECH STACK</text>
    <text class="mono" fill="var(--muted)" x="952" y="42" font-size="11" letter-spacing="2" text-anchor="end">CORE.STK // Nº 03</text>
  </g>
  <line class="draw a2" x1="48" y1="56" x2="952" y2="56" stroke="var(--rule)" stroke-width="1"/>

  <!-- Tech categories grid -->
  <g class="rise a2">
    <!-- Orchestration & Containers -->
    <text class="mono" fill="var(--accent)" x="48" y="90" font-size="12" font-weight="700" letter-spacing="1">CONTAINERS &amp; ORCHESTRATION</text>
    <text class="mono" fill="var(--bone)" x="48" y="110" font-size="13">Kubernetes (AKS, EKS) · Docker · Helm · Container Security</text>

    <!-- CI/CD & GitOps -->
    <text class="mono" fill="var(--accent)" x="48" y="160" font-size="12" font-weight="700" letter-spacing="1">AUTOMATION &amp; GITOPS</text>
    <text class="mono" fill="var(--bone)" x="48" y="180" font-size="13">ArgoCD · Azure DevOps Pipelines · GitHub Actions · DevSecOps</text>
  </g>

  <g class="rise a3">
    <!-- Observability & Databases -->
    <text class="mono" fill="var(--accent)" x="520" y="90" font-size="12" font-weight="700" letter-spacing="1">DATABASES &amp; OBSERVABILITY</text>
    <text class="mono" fill="var(--bone)" x="520" y="110" font-size="13">Prometheus · Grafana · CloudNativePG · Kafka · HAProxy · MongoDB</text>

    <!-- Scripting & Security -->
    <text class="mono" fill="var(--accent)" x="520" y="160" font-size="12" font-weight="700" letter-spacing="1">SCRIPTING &amp; SECURITY</text>
    <text class="mono" fill="var(--bone)" x="520" y="180" font-size="13">Nessus · Qualys · Python · Bash · k6 Load Testing · SAST/DAST</text>
  </g>

  <line class="draw a4" x1="48" y1="230" x2="952" y2="230" stroke="var(--rule)" stroke-width="1"/>
</svg>
