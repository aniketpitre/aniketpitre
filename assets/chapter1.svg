<svg viewBox="0 0 1000 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chapter I — Hello World">
  <style>
    :root { 
      --bone: #0B0A09; 
      --rule: #E2DDD5; 
      --muted: #7E7870; 
      --dim: #9E978E; 
      --accent: #D9663F; 
      --card-bg: #FDFDFD;
      --card-border: #E8E5DF;
      --json-key: #D9663F;
      --json-val: #22C55E;
    }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.2s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .rise { opacity: 0; animation: rise .8s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(10px); } to { opacity:1;transform:translateY(0); } }
    .fade { opacity: 0; animation: fade .6s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    
    .a1{animation-delay:.1s} .a2{animation-delay:.3s} .a3{animation-delay:.5s} .a4{animation-delay:.7s} .a5{animation-delay:.9s}
    @media (prefers-reduced-motion: reduce) {
      .draw,.rise,.fade { animation: none; }
      .draw { stroke-dashoffset: 0; } .rise,.fade { opacity: 1; }
    }
  </style>

  <!-- Panel Borders -->
  <line class="draw a1" x1="48" y1="20" x2="952" y2="20" stroke="var(--rule)" stroke-width="1"/>
  <g class="fade a1">
    <text class="mono" fill="var(--bone)" x="48" y="42" font-size="12" font-weight="700" letter-spacing="2">CHAPTER I // HELLO WORLD</text>
    <text class="mono" fill="var(--muted)" x="952" y="42" font-size="11" letter-spacing="2" text-anchor="end">INDEX // Nº 01</text>
  </g>
  <line class="draw a2" x1="48" y1="56" x2="952" y2="56" stroke="var(--rule)" stroke-width="1"/>

  <!-- Content Description -->
  <g class="rise a2">
    <text fill="var(--bone)" class="mono" x="48" y="85" font-size="13" font-style="italic">I specialize in orchestrating scalable cloud infrastructures and highly available fintech payment systems.</text>
    <text fill="var(--bone)" class="mono" x="48" y="105" font-size="13" font-style="italic">My focus is on automating continuous delivery, enhancing runtime observability, and securing enterprise deployments.</text>
  </g>

  <!-- JSON Profile Panel (HUD Card style) -->
  <g class="fade a3">
    <rect x="48" y="130" width="460" height="210" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
    <text class="mono" fill="var(--muted)" x="68" y="152" font-size="10.5">profile.json</text>
    <line x1="48" y1="162" x2="508" y2="162" stroke="var(--card-border)" stroke-width="1"/>
    
    <text class="mono" fill="var(--bone)" x="68" y="186" font-size="11.5">{</text>
    <text class="mono" x="88" y="206" font-size="11.5"><tspan fill="var(--json-key)">&quot;name&quot;</tspan>: <tspan fill="var(--json-val)">&quot;Aniket Pitre&quot;</tspan>,</text>
    <text class="mono" x="88" y="226" font-size="11.5"><tspan fill="var(--json-key)">&quot;role&quot;</tspan>: <tspan fill="var(--json-val)">&quot;DevOps Engineer&quot;</tspan>,</text>
    <text class="mono" x="88" y="246" font-size="11.5"><tspan fill="var(--json-key)">&quot;location&quot;</tspan>: <tspan fill="var(--json-val)">&quot;Nashik, India&quot;</tspan>,</text>
    <text class="mono" x="88" y="266" font-size="11.5"><tspan fill="var(--json-key)">&quot;focus&quot;</tspan>: [<tspan fill="var(--json-val)">&quot;Kubernetes&quot;</tspan>, <tspan fill="var(--json-val)">&quot;GitOps&quot;</tspan>],</text>
    <text class="mono" x="88" y="286" font-size="11.5"><tspan fill="var(--json-key)">&quot;stack&quot;</tspan>: [<tspan fill="var(--json-val)">&quot;AKS&quot;</tspan>, <tspan fill="var(--json-val)">&quot;ArgoCD&quot;</tspan>, <tspan fill="var(--json-val)">&quot;CNPG&quot;</tspan>],</text>
    <text class="mono" x="88" y="306" font-size="11.5"><tspan fill="var(--json-key)">&quot;status&quot;</tspan>: <tspan fill="var(--json-val)">&quot;open_to_work&quot;</tspan></text>
    <text class="mono" fill="var(--bone)" x="68" y="326" font-size="11.5">}</text>
  </g>

  <!-- Coordinates & Bullet Details -->
  <g class="rise a4">
    <!-- Base Station -->
    <text class="mono" fill="var(--dim)" x="540" y="160" font-size="12">📍 Base Station</text>
    <text class="mono" fill="var(--bone)" x="560" y="180" font-size="12">Nashik, India (19.99° N, 73.78° E)</text>

    <!-- Core Pillars -->
    <text class="mono" fill="var(--dim)" x="540" y="220" font-size="12">⚡ Core Pillars</text>
    <text class="mono" fill="var(--bone)" x="560" y="240" font-size="12">DevOps · SRE · Cloud Infrastructure · DevSecOps</text>

    <!-- Academics -->
    <text class="mono" fill="var(--dim)" x="540" y="280" font-size="12">🎓 Academics</text>
    <text class="mono" fill="var(--bone)" x="560" y="300" font-size="12">Pursuing Post-Graduate MCA (2024–2026)</text>
    <text class="mono" fill="var(--bone)" x="560" y="318" font-size="12">while shipping production clusters full-time</text>
  </g>

  <line class="draw a5" x1="48" y1="360" x2="952" y2="360" stroke="var(--rule)" stroke-width="1"/>
</svg>
